name: My First CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Say Hello
      run: echo "Hello! My first GitHub Actions workflow is running!"
    
    - name: Show date
      run: date
    
    - name: List files
      run: ls -la
    
    - name: Show Python version
      run: python --version
